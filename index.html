<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>2級 English Journey Unit 3 フラッシュカード</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  body {
    font-family: 'Helvetica Neue', 'Hiragino Sans', 'Yu Gothic', sans-serif;
    background: #1e1e24;
    background-image: radial-gradient(circle at 20% 10%, #2a2a35 0%, #1a1a20 70%);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 20px;
  }
  h1 {
    color: #ff9a3c;
    margin-bottom: 6px;
    text-align: center;
    font-weight: 700;
    letter-spacing: 1px;
  }
  .subtitle {
    color: #c8c8d0;
    margin-bottom: 20px;
    text-align: center;
    font-size: 14px;
  }
  .progress {
    color: #ffd28a;
    font-size: 18px;
    margin-bottom: 12px;
    font-weight: 600;
  }
  .progress-bar {
    width: 100%;
    max-width: 600px;
    height: 8px;
    background: rgba(255,255,255,0.15);
    border-radius: 10px;
    overflow: hidden;
    margin-bottom: 20px;
  }
  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, #ff9a3c 0%, #6bcb77 100%);
    transition: width 0.3s;
    width: 5%;
  }
  .card {
    width: 100%;
    max-width: 600px;
    min-height: 430px;
    background: #fafafa;
    border-radius: 16px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.5);
    padding: 28px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    border: 2px solid #ff9a3c;
    margin-bottom: 18px;
    cursor: pointer;
    position: relative;
    transition: background 0.3s, border-color 0.3s;
  }
  .card.back {
    background: #fff8ee;
    border-color: #6bcb77;
    justify-content: flex-start;
    padding-top: 32px;
  }
  .face-front, .face-back {
    width: 100%;
    display: flex;
    flex-direction: column;
    align-items: center;
  }
  .face-back { display: none; }
  .card.back .face-front { display: none; }
  .card.back .face-back { display: flex; }
  .word {
    font-size: 40px;
    font-weight: 700;
    color: #2c3e50;
    margin-bottom: 8px;
    word-break: break-word;
    text-align: center;
    width: 100%;
  }
  .phonetic {
    font-size: 20px;
    color: #e67e22;
    margin-bottom: 12px;
    font-weight: 500;
    text-align: center;
    width: 100%;
  }
  .pos {
    font-size: 13px;
    color: #555;
    font-style: italic;
    background: #ececec;
    padding: 4px 12px;
    border-radius: 12px;
    margin-bottom: 20px;
  }
  .tap-hint {
    margin-top: 18px;
    font-size: 13px;
    color: #888;
    text-align: center;
    width: 100%;
  }
  .meaning {
    font-size: 28px;
    color: #c0392b;
    font-weight: 700;
    margin-bottom: 18px;
    width: 100%;
    text-align: center;
  }
  .example-label {
    font-size: 12px;
    color: #27ae60;
    margin-bottom: 6px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    width: 100%;
    text-align: left;
  }
  .example {
    font-size: 15px;
    color: #2c3e50;
    line-height: 1.6;
    background: white;
    padding: 14px;
    border-radius: 10px;
    border-left: 4px solid #27ae60;
    margin-bottom: 10px;
    text-align: left;
    width: 100%;
  }
  .example-jp {
    font-size: 13px;
    color: #444;
    line-height: 1.5;
    text-align: left;
    width: 100%;
    margin-bottom: 14px;
    padding: 0 4px;
  }
  .controls {
    display: flex;
    gap: 10px;
    align-items: center;
    flex-wrap: wrap;
    justify-content: center;
    margin-top: 6px;
    width: 100%;
  }
  .btn {
    padding: 10px 22px;
    border-radius: 22px;
    cursor: pointer;
    font-size: 14px;
    font-weight: 700;
    border: 2px solid;
    transition: background 0.2s;
    font-family: inherit;
    -webkit-appearance: none;
    appearance: none;
  }
  .btn-orange { background: #ff7e3c; color: #fff; border-color: #d35400; }
  .btn-orange:active { background: #d35400; }
  .btn-green { background: #27ae60; color: #fff; border-color: #1e8449; }
  .btn-green:active { background: #1e8449; }
  .btn-white { background: #fff; color: #1e1e24; border-color: #fff; }
  .btn-white:active { background: #e0e0e0; }
  .btn:disabled { opacity: 0.4; cursor: not-allowed; }
  .speed-control {
    background: white;
    padding: 7px 14px;
    border-radius: 22px;
    display: inline-flex;
    align-items: center;
    gap: 8px;
    font-size: 13px;
    color: #2c3e50;
    font-weight: 500;
    border: 2px solid #d35400;
  }
  .speed-control select {
    border: 2px solid #ff7e3c;
    border-radius: 15px;
    padding: 3px 8px;
    font-size: 13px;
    background: white;
    cursor: pointer;
    font-weight: 700;
    color: #d35400;
    outline: none;
    font-family: inherit;
  }
  .nav-controls {
    display: flex;
    gap: 10px;
    justify-content: center;
    flex-wrap: wrap;
    margin-top: 10px;
  }
  .nav-btn {
    padding: 12px 28px;
    border-radius: 25px;
    cursor: pointer;
    font-size: 15px;
    font-weight: 700;
    border: 2px solid;
    transition: background 0.2s;
    font-family: inherit;
    -webkit-appearance: none;
    appearance: none;
  }
  .list-toggle {
    display: block;
    margin: 18px auto 0;
    padding: 9px 20px;
    border-radius: 20px;
    cursor: pointer;
    font-size: 14px;
    font-weight: 700;
    background: #ff7e3c;
    color: #fff;
    border: 2px solid #d35400;
    font-family: inherit;
    -webkit-appearance: none;
    appearance: none;
  }
  .list-toggle:active { background: #d35400; }
  .word-list {
    background: white;
    border-radius: 12px;
    padding: 16px;
    margin-top: 16px;
    max-width: 600px;
    width: 100%;
    max-height: 300px;
    overflow-y: auto;
    display: none;
    border: 2px solid #ff9a3c;
  }
  .word-list.show { display: block; }
  .list-item {
    padding: 10px 12px;
    border-bottom: 1px solid #e8e8e8;
    cursor: pointer;
    display: flex;
    gap: 10px;
    align-items: center;
    font-size: 14px;
  }
  .list-item:active { background: #fff8ee; }
  .list-item.current { background: #fff0e0; font-weight: 700; border-left: 4px solid #ff7e3c; }
  .list-num { color: #d35400; min-width: 28px; font-weight: 700; }
  .list-word { flex: 1; color: #2c3e50; }
  .list-meaning { color: #1e8449; font-size: 13px; font-weight: 500; }
  
  @media (max-width: 480px) {
    .word { font-size: 32px; }
    .meaning { font-size: 22px; }
    .example { font-size: 14px; }
    .nav-btn { padding: 10px 20px; font-size: 14px; }
  }
</style>
</head>
<body>
  <h1>2級 English Journey Unit 3</h1>
  <div class="subtitle">Why Do Countries Invest in Space Exploration? より 重要単語・熟語30選</div>
  
  <div class="progress" id="progress">1 / 30</div>
  <div class="progress-bar">
    <div class="progress-fill" id="progressFill"></div>
  </div>
  
  <div class="card" id="card">
    <div class="face-front">
      <div class="word" id="word"></div>
      <div class="phonetic" id="phonetic"></div>
      <div class="pos" id="pos"></div>
      <div class="controls">
        <button type="button" class="btn btn-orange" id="playWord">🔊 単語を再生</button>
        <span class="speed-control">速度
          <select id="speedSelect">
            <option value="0.5">0.5x</option>
            <option value="0.75">0.75x</option>
            <option value="1.0" selected>1.0x</option>
            <option value="1.25">1.25x</option>
            <option value="1.5">1.5x</option>
          </select>
        </span>
      </div>
      <div class="tap-hint">👆 タップで意味を表示</div>
    </div>
    <div class="face-back">
      <div class="meaning" id="meaning"></div>
      <div class="example-label">📖 本文での使用例</div>
      <div class="example" id="example"></div>
      <div class="example-jp" id="exampleJp"></div>
      <div class="controls">
        <button type="button" class="btn btn-green" id="playExample">🔊 例文を再生</button>
      </div>
    </div>
  </div>
  
  <div class="nav-controls">
    <button type="button" class="nav-btn btn-white" id="prevBtn">← 前へ</button>
    <button type="button" class="nav-btn btn-orange" id="shuffleBtn">🔀 シャッフル</button>
    <button type="button" class="nav-btn btn-green" id="resetBtn">🔄 リセット</button>
    <button type="button" class="nav-btn btn-white" id="nextBtn">次へ →</button>
  </div>
  
  <button type="button" class="list-toggle" id="listToggle">📋 単語一覧を表示</button>
  
  <div class="word-list" id="wordList"></div>

<script>
(function() {
  var original = [
    { word: "space exploration", phonetic: "/speɪs ˌekspləˈreɪʃən/", pos: "名詞句 (noun phrase)", meaning: "宇宙探査", example: "Space exploration requires a large amount of money.", exampleJp: "宇宙探査には多額のお金が必要です。" },
    { word: "require", phonetic: "/rɪˈkwaɪər/", pos: "動詞 (verb)", meaning: "必要とする、要求する", example: "Space exploration requires advanced technology.", exampleJp: "宇宙探査には高度な技術が必要です。" },
    { word: "amount", phonetic: "/əˈmaʊnt/", pos: "名詞 (noun)", meaning: "量、金額", example: "It requires a large amount of money.", exampleJp: "それは大量のお金を必要とします。" },
    { word: "advanced", phonetic: "/ədˈvænst/", pos: "形容詞 (adjective)", meaning: "高度な、先進の", example: "Space exploration requires advanced technology.", exampleJp: "宇宙探査には高度な技術が必要です。" },
    { word: "research", phonetic: "/ˈriːsɜːrtʃ/", pos: "名詞 (noun)", meaning: "研究、調査", example: "It requires many years of research.", exampleJp: "それには長年の研究が必要です。" },
    { word: "because of", phonetic: "/bɪˈkɔːz əv/", pos: "熟語 (phrase)", meaning: "〜のために、〜のせいで", example: "Because of this, some people wonder why countries invest in space.", exampleJp: "このため、なぜ国々が宇宙に投資するのか疑問に思う人もいます。" },
    { word: "wonder", phonetic: "/ˈwʌndər/", pos: "動詞 (verb)", meaning: "不思議に思う、〜だろうかと思う", example: "Some people wonder why countries invest so much in space programs.", exampleJp: "なぜ国々が宇宙プログラムに多額の投資をするのか疑問に思う人もいます。" },
    { word: "invest", phonetic: "/ɪnˈvest/", pos: "動詞 (verb)", meaning: "投資する", example: "Many countries invest in space exploration.", exampleJp: "多くの国が宇宙探査に投資しています。" },
    { word: "benefit", phonetic: "/ˈbenɪfɪt/", pos: "名詞 (noun)", meaning: "利益、恩恵", example: "Space exploration brings important benefits to society.", exampleJp: "宇宙探査は社会に重要な利益をもたらします。" },
    { word: "society", phonetic: "/səˈsaɪəti/", pos: "名詞 (noun)", meaning: "社会", example: "Space exploration brings benefits to society.", exampleJp: "宇宙探査は社会に利益をもたらします。" },
    { word: "humanity", phonetic: "/hjuːˈmænəti/", pos: "名詞 (noun)", meaning: "人類、人間性", example: "Space exploration benefits the future of humanity.", exampleJp: "宇宙探査は人類の未来に利益をもたらします。" },
    { word: "scientific", phonetic: "/ˌsaɪənˈtɪfɪk/", pos: "形容詞 (adjective)", meaning: "科学的な", example: "One major reason for investing in space is scientific discovery.", exampleJp: "宇宙に投資する主な理由の一つは科学的発見です。" },
    { word: "discovery", phonetic: "/dɪˈskʌvəri/", pos: "名詞 (noun)", meaning: "発見", example: "Scientific discovery is a major reason for space investment.", exampleJp: "科学的発見は宇宙への投資の主な理由です。" },
    { word: "satellite", phonetic: "/ˈsætəlaɪt/", pos: "名詞 (noun)", meaning: "人工衛星", example: "Scientists send satellites into space to learn more about the universe.", exampleJp: "科学者は宇宙についてもっと学ぶために人工衛星を宇宙に送ります。" },
    { word: "probe", phonetic: "/proʊb/", pos: "名詞 (noun)", meaning: "探査機", example: "Probes are sent into space to explore planets.", exampleJp: "探査機は惑星を探検するために宇宙に送られます。" },
    { word: "universe", phonetic: "/ˈjuːnɪvɜːrs/", pos: "名詞 (noun)", meaning: "宇宙", example: "Scientists study the origins of the universe.", exampleJp: "科学者は宇宙の起源を研究しています。" },
    { word: "knowledge", phonetic: "/ˈnɑːlɪdʒ/", pos: "名詞 (noun)", meaning: "知識", example: "This knowledge helps people understand Earth.", exampleJp: "この知識は人々が地球を理解するのに役立ちます。" },
    { word: "disaster", phonetic: "/dɪˈzæstər/", pos: "名詞 (noun)", meaning: "災害", example: "Research in space can lead to discoveries about natural disasters.", exampleJp: "宇宙での研究は自然災害についての発見につながることがあります。" },
    { word: "practical", phonetic: "/ˈpræktɪkəl/", pos: "形容詞 (adjective)", meaning: "実際的な、実用的な", example: "Another reason is the practical use of space technology.", exampleJp: "もう一つの理由は宇宙技術の実用的な使い方です。" },
    { word: "depend on", phonetic: "/dɪˈpend ɑːn/", pos: "熟語 (phrase)", meaning: "〜に依存する、〜次第である", example: "Many services depend on satellites.", exampleJp: "多くのサービスは人工衛星に依存しています。" },
    { word: "forecast", phonetic: "/ˈfɔːrkæst/", pos: "名詞 (noun)", meaning: "予報、予測", example: "Weather satellites improve forecasts.", exampleJp: "気象衛星は予報を改善します。" },
    { word: "encourage", phonetic: "/ɪnˈkɜːrɪdʒ/", pos: "動詞 (verb)", meaning: "促進する、励ます", example: "Space programs also encourage innovation.", exampleJp: "宇宙プログラムはまた革新を促進します。" },
    { word: "innovation", phonetic: "/ˌɪnəˈveɪʃən/", pos: "名詞 (noun)", meaning: "革新、イノベーション", example: "Space programs encourage innovation.", exampleJp: "宇宙プログラムは革新を促進します。" },
    { word: "in order to", phonetic: "/ɪn ˈɔːrdər tuː/", pos: "熟語 (phrase)", meaning: "〜するために", example: "In order to solve difficult problems, engineers develop new materials.", exampleJp: "難しい問題を解決するために、技術者は新しい材料を開発します。" },
    { word: "develop", phonetic: "/dɪˈveləp/", pos: "動詞 (verb)", meaning: "開発する、発達させる", example: "Engineers develop new materials and systems.", exampleJp: "技術者は新しい材料やシステムを開発します。" },
    { word: "environmental", phonetic: "/ɪnˌvaɪrənˈmentəl/", pos: "形容詞 (adjective)", meaning: "環境の", example: "These technologies are used in environmental protection.", exampleJp: "これらの技術は環境保護に使われます。" },
    { word: "strengthen", phonetic: "/ˈstreŋθən/", pos: "動詞 (verb)", meaning: "強化する", example: "Space exploration can strengthen national pride.", exampleJp: "宇宙探査は国の誇りを強化することができます。" },
    { word: "inspire", phonetic: "/ɪnˈspaɪər/", pos: "動詞 (verb)", meaning: "刺激する、鼓舞する", example: "Successful missions inspire young people to study science.", exampleJp: "成功した任務は若者に科学を学ぶことを促します。" },
    { word: "cooperation", phonetic: "/koʊˌɑːpəˈreɪʃən/", pos: "名詞 (noun)", meaning: "協力", example: "Space projects can lead to cooperation between countries.", exampleJp: "宇宙プロジェクトは国々の協力につながることがあります。" },
    { word: "expand", phonetic: "/ɪkˈspænd/", pos: "動詞 (verb)", meaning: "広げる、拡大する", example: "Space exploration expands human knowledge.", exampleJp: "宇宙探査は人類の知識を広げます。" }
  ];

  var cards = original.slice();
  var currentIndex = 0;
  var speed = 1.0;
  var englishVoice = null;

  function initVoices() {
    if (typeof speechSynthesis === 'undefined') return;
    var voices = speechSynthesis.getVoices();
    if (!voices || voices.length === 0) return;
    englishVoice = null;
    for (var i = 0; i < voices.length; i++) {
      if (voices[i].lang === 'en-US' && voices[i].name.indexOf('Google') !== -1) {
        englishVoice = voices[i];
        return;
      }
    }
    for (var j = 0; j < voices.length; j++) {
      if (voices[j].lang === 'en-US') { englishVoice = voices[j]; return; }
    }
    for (var k = 0; k < voices.length; k++) {
      if (voices[k].lang === 'en-GB') { englishVoice = voices[k]; return; }
    }
    for (var l = 0; l < voices.length; l++) {
      if (voices[l].lang && voices[l].lang.indexOf('en') === 0) { englishVoice = voices[l]; return; }
    }
  }

  if (typeof speechSynthesis !== 'undefined') {
    if (speechSynthesis.onvoiceschanged !== undefined) {
      speechSynthesis.onvoiceschanged = initVoices;
    }
    initVoices();
  }

  function renderCard() {
    var c = cards[currentIndex];
    document.getElementById('word').textContent = c.word;
    document.getElementById('phonetic').textContent = c.phonetic;
    document.getElementById('pos').textContent = c.pos;
    document.getElementById('meaning').textContent = c.meaning;
    document.getElementById('example').textContent = c.example;
    document.getElementById('exampleJp').textContent = c.exampleJp;
    document.getElementById('progress').textContent = (currentIndex + 1) + ' / ' + cards.length;
    document.getElementById('progressFill').style.width = Math.round(((currentIndex + 1) / cards.length) * 100) + '%';
    document.getElementById('card').classList.remove('back');
    document.getElementById('prevBtn').disabled = currentIndex === 0;
    document.getElementById('nextBtn').disabled = currentIndex === cards.length - 1;
    updateWordList();
  }

  function flipCard() {
    document.getElementById('card').classList.toggle('back');
  }

  function nextCard() {
    if (currentIndex < cards.length - 1) {
      currentIndex++;
      renderCard();
    }
  }

  function prevCard() {
    if (currentIndex > 0) {
      currentIndex--;
      renderCard();
    }
  }

  function speak(text) {
    if (typeof speechSynthesis === 'undefined') {
      alert('お使いのブラウザは音声再生に対応していません');
      return;
    }
    try {
      speechSynthesis.cancel();
      var u = new SpeechSynthesisUtterance(text);
      u.lang = 'en-US';
      u.rate = speed;
      if (englishVoice) u.voice = englishVoice;
      speechSynthesis.speak(u);
    } catch (e) {
      console.log('Speech error:', e);
    }
  }

  function shuffle() {
    for (var i = cards.length - 1; i > 0; i--) {
      var j = Math.floor(Math.random() * (i + 1));
      var tmp = cards[i];
      cards[i] = cards[j];
      cards[j] = tmp;
    }
    currentIndex = 0;
    renderCard();
  }

  function resetCards() {
    cards = original.slice();
    currentIndex = 0;
    renderCard();
  }

  function updateWordList() {
    var list = document.getElementById('wordList');
    var html = '';
    for (var i = 0; i < cards.length; i++) {
      html += '<div class="list-item' + (i === currentIndex ? ' current' : '') + '" data-index="' + i + '">';
      html += '<span class="list-num">' + (i + 1) + '.</span>';
      html += '<span class="list-word"></span>';
      html += '<span class="list-meaning"></span>';
      html += '</div>';
    }
    list.innerHTML = html;
    var items = list.getElementsByClassName('list-item');
    for (var k = 0; k < items.length; k++) {
      items[k].getElementsByClassName('list-word')[0].textContent = cards[k].word;
      items[k].getElementsByClassName('list-meaning')[0].textContent = cards[k].meaning;
      (function(idx) {
        items[idx].addEventListener('click', function() {
          currentIndex = idx;
          renderCard();
        });
      })(k);
    }
  }

  document.getElementById('card').addEventListener('click', function(e) {
    var target = e.target;
    while (target && target !== this) {
      if (target.classList && (target.classList.contains('controls') || target.tagName === 'BUTTON' || target.tagName === 'SELECT')) {
        return;
      }
      target = target.parentNode;
    }
    flipCard();
  });

  document.getElementById('playWord').addEventListener('click', function(e) {
    e.stopPropagation();
    speak(cards[currentIndex].word);
  });
  document.getElementById('playExample').addEventListener('click', function(e) {
    e.stopPropagation();
    speak(cards[currentIndex].example);
  });
  document.getElementById('speedSelect').addEventListener('change', function() {
    speed = parseFloat(this.value);
  });
  document.getElementById('speedSelect').addEventListener('click', function(e) {
    e.stopPropagation();
  });
  document.getElementById('prevBtn').addEventListener('click', prevCard);
  document.getElementById('nextBtn').addEventListener('click', nextCard);
  document.getElementById('shuffleBtn').addEventListener('click', shuffle);
  document.getElementById('resetBtn').addEventListener('click', resetCards);
  document.getElementById('listToggle').addEventListener('click', function() {
    document.getElementById('wordList').classList.toggle('show');
  });

  document.addEventListener('keydown', function(e) {
    if (e.key === 'ArrowRight') nextCard();
    else if (e.key === 'ArrowLeft') prevCard();
    else if (e.key === ' ') { e.preventDefault(); flipCard(); }
  });

  renderCard();
